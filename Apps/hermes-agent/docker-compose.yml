version: "3.8"

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    ports:
      - "8642:8642"      # Main gateway / API
      - "8090:8090"      # Optional: Built-in dashboard
    volumes:
      - hermes_data:/opt/data
      - /var/run/docker.sock:/var/run/docker.sock:ro   # For Docker tool use
    environment:
      - HERMES_MODE=gateway
      - OPENAI_API_BASE=http://litellm:4000/v1
      - OPENAI_API_KEY=sk-casaos   # Dummy key, LiteLLM accepts anything
    depends_on:
      - litellm
    x-casaos:
      ports:
        - container: "8642"
          description: Hermes Agent API Gateway
        - container: "8090"
          description: Hermes Built-in Dashboard

volumes:
  hermes_data: