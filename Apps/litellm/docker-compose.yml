version: "3.8"

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - LITELLM_LOG=true
    volumes:
      - litellm_config:/app
    x-casaos:
      ports:
        - container: "4000"
          description: LiteLLM Dashboard & API

volumes:
  litellm_config:
