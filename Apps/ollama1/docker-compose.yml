version: "3.8"

services:
  ollama1:
    image: ollama/ollama:latest
    container_name: ollama1
    restart: unless-stopped
    ports:
      - "11435:11434"   # Host port 11435 → Container 11434
    volumes:
      - ollama1_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Add these if you want different cloud sign-in behavior
      # - OLLAMA_NO_CLOUD=1        # Disable cloud features
      # - OLLAMA_API_KEY=your_key  # For Ollama cloud auth
    x-casaos:
      ports:
        - container: "11434"
          description: Ollama API (Instance 1)

volumes:
  ollama1_data: